name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

# ── 設定 ──────────────────────────────────────────────────────────────
# SERVICE_NAME は it-kadai に既に存在するデモ用 Cloud Run サービス名に
# 合わせてください（違う名前だと新しいサービス＝別URLが作られます）。
#   確認: gcloud run services list --project it-kadai --region asia-northeast1
env:
  PROJECT_ID: it-kadai
  REGION: asia-northeast1
  SERVICE_NAME: recording-app
  # デプロイ兼ランタイムのサービスアカウント（下記セットアップで作成）
  RUNTIME_SA: github-deployer@it-kadai.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Workload Identity Federation に必須

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # キーレス認証（Workload Identity Federation）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Dockerfile を使った source ベースのビルド＆デプロイ（Cloud Build 経由）。
      # 手動 docker build/push より依存が少なく壊れにくい。
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --service-account "$RUNTIME_SA" \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 900 \
            --set-env-vars "NODE_ENV=production,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},VERTEX_AI_LOCATION=${REGION},GCS_BUCKET=it-kadai-audio,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"

      - name: Show Service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          echo "✅ Deployed: $URL"
